<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fon__nail | 完整數位選單</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=Poppins:wght@200;400&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #E5989B 0%, #1B263B 100%);
            background-attachment: fixed;
            display: flex; justify-content: center; align-items: flex-start;
            padding: 30px 0;
        }

        .glass-box {
            width: 90%; max-width: 450px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 30px 20px; box-sizing: border-box;
        }

        h1 { font-family: 'Poppins', sans-serif; font-weight: 200; font-size: 28px; letter-spacing: 5px; text-align: center; margin: 0; color: #1B263B; }
        .sub-text { font-size: 11px; text-align: center; margin: 10px 0; color: #4A4E69; }

        /* 展開式選單樣式 */
        .category-btn {
            width: 100%; background: rgba(255, 255, 255, 0.2);
            border: none; padding: 18px; border-radius: 15px;
            margin-top: 15px; font-size: 17px; font-weight: 700;
            color: #1B263B; cursor: pointer; display: flex; justify-content: space-between;
            transition: 0.3s;
        }

        .category-content {
            max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out;
            padding: 0 10px;
        }
        .category-content.show { max-height: 600px; padding-top: 15px; }

        /* 選項樣式 */
        .item {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px; margin-bottom: 10px; padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; border: 1px solid transparent;
        }
        .item.active { background: rgba(255, 255, 255, 0.7); border: 1px solid #E5989B; }
        
        .price { font-weight: 700; color: #1B263B; }
        .details { font-size: 11px; color: #6D6875; display: block; margin-top: 3px; }

        /* 底部結算 */
        .footer-bar {
            position: sticky; bottom: -10px; background: rgba(255,255,255,0.9);
            margin: 30px -20px -30px -20px; padding: 25px;
            border-radius: 0 0 25px 25px; text-align: center;
        }
        .total { font-size: 30px; font-weight: 700; color: #1B263B; margin-bottom: 15px; }
        .submit {
            background: #1B263B; color: white; border: none; width: 100%;
            padding: 15px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="glass-box">
    <h1>PRICE LIST</h1>
    <div class="sub-text">fon__nail 專業美甲服務</div>

    <button class="category-btn" onclick="toggleCat('cat1')"><span>✨ 卸甲服務</span><span>＋</span></button>
    <div id="cat1" class="category-content">
        <div class="item" onclick="toggleItem(this, 100)">
            <div><span>本店卸續做</span><span class="details">含基礎保養</span></div>
            <span class="price">$100</span>
        </div>
        <div class="item" onclick="toggleItem(this, 200)">
            <div><span>他店卸續做</span><span class="details">含大飾品/厚甲處理</span></div>
            <span class="price">$200</span>
        </div>
    </div>

    <button class="category-btn" onclick="toggleCat('cat2')"><span>🎨 美甲款式</span><span>＋</span></button>
    <div id="cat2" class="category-content">
        <div class="item" onclick="selectOne(this, 500)">
            <div><span>單色 / 貓眼</span><span class="details">含建構與跳色1色</span></div>
            <span class="price">$500</span>
        </div>
        <div class="item" onclick="selectOne(this, 700)">
            <div><span>指定款式</span><span class="details">依複雜度報價</span></div>
            <span class="price">$700</span>
        </div>
    </div>

    <button class="category-btn" onclick="toggleCat('cat3')"><span>📢 預約須知</span><span>＋</span></button>
    <div id="cat3" class="category-content" style="color: #4A4E69; font-size: 13px; line-height: 1.8;">
        • 台中南屯居家工作室<br>
        • 預約需支付訂金 500 元<br>
        • 施作約 3-4 小時，請預留時間
    </div>

    <div class="footer-bar">
        <div class="total">NT$ <span id="total">0</span></div>
        <button class="submit" onclick="submit()">產生預約訊息</button>
    </div>
</div>

<script>
    function toggleCat(id) {
        const el = document.getElementById(id);
        el.classList.toggle('show');
    }

    function toggleItem(el) { el.classList.toggle('active'); calc(); }

    function selectOne(el) {
        const siblings = el.parentElement.querySelectorAll('.item');
        const active = el.classList.contains('active');
        siblings.forEach(s => s.classList.remove('active'));
        if (!active) el.classList.add('active');
        calc();
    }

    function calc() {
        let t = 0;
        document.querySelectorAll('.item.active .price').forEach(p => {
            t += parseInt(p.innerText.replace('$', ''));
        });
        document.getElementById('total').innerText = t;
    }

    function submit() {
        let items = [];
        document.querySelectorAll('.item.active').forEach(i => items.push(i.innerText.split('\n')[0]));
        if (items.length === 0) return alert("請選擇服務");
        const msg = `【fon__nail 預約】\n項目：${items.join(' + ')}\n總計：NT$ ${document.getElementById('total').innerText}`;
        window.location.href = `https://line.me/R/msg/text/?${encodeURIComponent(msg)}`;
    }
</script>

</body>
</html>
