<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fon__nail | 數位服務計算</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=Poppins:wght@200;400&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #E5989B 0%, #1B263B 100%); /* 紅藍漸層背景 */
            background-attachment: fixed;
            display: flex; justify-content: center; align-items: flex-start;
            padding: 20px 0;
        }

        .glass-container {
            width: 90%; max-width: 450px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px 20px; box-sizing: border-box; color: #4A4E69;
        }

        h1 { font-family: 'Poppins', sans-serif; font-weight: 200; font-size: 28px; letter-spacing: 5px; text-align: center; margin: 0; }
        .subtitle { font-size: 11px; text-align: center; margin: 10px 0; color: #6D6875; }
        .divider { height: 1px; background-color: rgba(74, 78, 105, 0.2); margin: 20px auto; width: 90%; }

        /* 選項樣式 */
        .item-group { margin-bottom: 25px; }
        .group-title { font-weight: 700; font-size: 16px; margin-bottom: 15px; display: block; border-left: 4px solid #E5989B; padding-left: 10px; }
        
        .option-row {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.2);
            margin-bottom: 8px; padding: 12px 15px; border-radius: 12px;
            cursor: pointer; transition: 0.3s;
        }
        .option-row.active { background: rgba(255, 255, 255, 0.6); border: 1px solid #E5989B; }

        /* 計算與結算區 */
        .total-section {
            position: sticky; bottom: 0; background: rgba(255, 255, 255, 0.8);
            margin: 20px -20px -30px -20px; padding: 20px;
            border-radius: 0 0 30px 30px; text-align: center;
        }
        .total-amount { font-size: 24px; font-weight: 700; color: #1B263B; margin-bottom: 10px; }
        .submit-btn {
            background: #1B263B; color: white; border: none; padding: 12px 30px;
            border-radius: 50px; font-size: 16px; cursor: pointer; width: 100%;
        }
    </style>
</head>
<body>

<div class="glass-container">
    <h1>PRICE LIST</h1>
    <div class="subtitle">fon__nail 數位服務選單</div>
    <div class="divider"></div>

    <div class="item-group">
        <span class="group-title">卸甲服務</span>
        <div class="option-row" onclick="toggleItem(this, '本店卸續做', 100)">
            <span>本店卸續做</span><span>$100</span>
        </div>
        <div class="option-row" onclick="toggleItem(this, '他店卸續做', 200)">
            <span>他店卸續做</span><span>$200</span>
        </div>
    </div>

    <div class="item-group">
        <span class="group-title">美甲款式</span>
        <div class="option-row" onclick="selectOne(this, 'style', '單色', 500)">
            <span>單色</span><span>$500</span>
        </div>
        <div class="option-row" onclick="selectOne(this, 'style', '貓眼', 600)">
            <span>貓眼</span><span>$600</span>
        </div>
        <div class="option-row" onclick="selectOne(this, 'style', '指定款', 700)">
            <span>指定款 (依複雜度起)</span><span>$700↑</span>
        </div>
    </div>

    <div class="divider"></div>

    <div class="total-section">
        <div class="total-amount">總計 NT$ <span id="total-price">0</span></div>
        <button class="submit-btn" onclick="generateOrder()">產出預約表單給店長</button>
    </div>
</div>

<script>
    let selectedItems = [];
    let totalPrice = 0;

    function toggleItem(element, name, price) {
        element.classList.toggle('active');
        updateTotal();
    }

    function selectOne(element, group, name, price) {
        // 同組只能選一個的邏輯
        const rows = element.parentElement.querySelectorAll('.option-row');
        rows.forEach(r => r.classList.remove('active'));
        element.classList.add('active');
        updateTotal();
    }

    function updateTotal() {
        totalPrice = 0;
        selectedItems = [];
        const actives = document.querySelectorAll('.option-row.active');
        actives.forEach(a => {
            const name = a.children[0].innerText;
            const price = parseInt(a.children[1].innerText.replace('$', ''));
            totalPrice += price;
            selectedItems.push(name);
        });
        document.getElementById('total-price').innerText = totalPrice;
    }

    function generateOrder() {
        if (selectedItems.length === 0) {
            alert("請至少選擇一項服務喔！");
            return;
        }
        const orderText = `【fon__nail 預約清單】\n服務項目：${selectedItems.join('、')}\n預估總金額：NT$ ${totalPrice}\n-------------------\n請填寫預約日期：\n請填寫聯絡電話：`;
        
        // 模擬產出表單，這段可以改成直接跳轉 LINE
        const encodedText = encodeURIComponent(orderText);
        window.location.href = `https://line.me/R/msg/text/?${encodedText}`;
    }
</script>

</body>
</html>
