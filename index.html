<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fon__nail | 服務選單</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=Poppins:wght@200;400&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #E5989B 0%, #1B263B 100%); /* 紅藍漸層背景 */
            background-attachment: fixed;
            display: flex; justify-content: center; align-items: center;
        }

        .container {
            width: 90%; max-width: 400px;
            text-align: center;
        }

        .brand-title {
            font-family: 'Poppins', sans-serif; font-weight: 200;
            font-size: 32px; letter-spacing: 6px; color: white; margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        /* 經典三方塊按鈕 - 毛玻璃質感 */
        .main-button {
            width: 100%; height: 120px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.3);
            margin-bottom: 20px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer;
            transition: all 0.3s ease; text-decoration: none;
        }

        .main-button:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.4); }

        .btn-title {
            font-size: 22px; font-weight: 400; color: white;
            letter-spacing: 2px; margin-bottom: 5px;
        }

        .btn-subtitle {
            font-size: 11px; color: rgba(255, 255, 255, 0.7); font-weight: 300;
        }

        /* 頁面下方的小字標示 */
        .footer-text {
            margin-top: 30px; font-size: 12px; color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-title">fon__nail</div>

    <a href="price_remove.html" class="main-button">
        <div class="btn-title">卸甲服務</div>
        <div class="btn-subtitle">REMOVAL SERVICES</div>
    </a>

    <a href="price_nail.html" class="main-button">
        <div class="btn-title">美甲款式</div>
        <div class="btn-subtitle">NAIL ART PRICE</div>
    </a>

    <a href="notice.html" class="main-button">
        <div class="btn-title">預約須知</div>
        <div class="btn-subtitle">BOOKING RULES</div>
    </a>

    <div class="footer-text">© 2026 fon__nail</div>
</div>

</body>
</html>
