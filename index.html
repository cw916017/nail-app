<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fon__nail | 快速估價</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=Poppins:wght@200;400&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Noto Sans TC', sans-serif;
            /* 復刻紅藍質感背景 */
            background: linear-gradient(135deg, #E5989B 0%, #1B263B 100%);
            background-attachment: fixed;
            display: flex; justify-content: center; align-items: flex-start;
            padding: 30px 0;
        }

        .glass-box {
            width: 88%; max-width: 420px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 30px 20px; box-sizing: border-box; color: #333;
        }

        h1 { font-family: 'Poppins', sans-serif; font-weight: 200; font-size: 30px; letter-spacing: 5px; text-align: center; margin: 0; }
        .sub-head { font-size: 11px; text-align: center; margin-top: 5px; color: #555; letter-spacing: 1px; }
        .line { height: 1px; background: rgba(0,0,0,0.1); margin: 20px auto; width: 80%; }

        .category { font-weight: 700; font-size: 16px; margin: 20px 0 10px 5px; color: #1B263B; }

        /* 選項樣式 */
        .item {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px; margin-bottom: 8px; padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.2s; border: 1px solid transparent;
        }
        .item.active {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid #E5989B;
        }

        .price { font-weight: 700; }
        .hint { font-size: 10px; color: #666; display: block; }

        /* 底部結帳區 */
        .calc-bar {
            margin-top: 30px; padding: 20px;
            background: rgba(255,255,255,0.8);
            border-radius: 15px; text-align: center;
        }
        .total-text { font-size: 28px; font-weight: 700; color: #1B263B; margin-bottom: 15px; }
        .btn {
            background: #1B263B; color: white; border: none; width: 100%;
            padding: 15px; border-radius: 10px; font-size: 16px; font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="glass-box">
    <h1>PRICE LIST</h1>
    <div class="sub-head">fon__nail 快速估價系統</div>
    <div class="line"></div>

    <div class="category">卸甲服務</div>
    <div class="item" onclick="toggle(this, '本店卸續做', 100)">
        <span>本店卸續做</span><span class="price">$100</span>
    </div>
    <div class="item" onclick="toggle(this, '他店卸續做', 200)">
        <div><span>他店卸續做</span><span class="hint">含厚甲/硬甲油</span></div>
        <span class="price">$200</span>
    </div>

    <div class="category">美甲款式</div>
    <div class="item" onclick="pickOne(this, '單色/貓眼', 500)">
        <span>單色 / 貓眼</span><span class="price">$500</span>
    </div>
    <div class="item" onclick="pickOne(this, '指定款', 700)">
        <div><span>造型指定款</span><span class="hint">依複雜度 $700 起</span></div>
        <span class="price">$700</span>
    </div>

    <div class="category">加購項目</div>
    <div class="item" onclick="toggle(this, '跳色', 20)">
        <span>跳色 (乙色)</span><span class="price">$20</span>
    </div>
    <div class="item" onclick="toggle(this, '延甲', 50)">
        <span>延甲 (每指)</span><span class="price">$50</span>
    </div>

    <div class="calc-bar">
        <div class="total-text">NT$ <span id="total">0</span></div>
        <button class="btn" onclick="send()">產生預約訊息</button>
    </div>
</div>

<script>
    function toggle(el) { el.classList.toggle('active'); calc(); }
    
    function pickOne(el) {
        const siblings = el.parentElement.querySelectorAll('.item');
        const wasActive = el.classList.contains('active');
        siblings.forEach(s => s.classList.remove('active'));
        if (!wasActive) el.classList.add('active');
        calc();
    }

    function calc() {
        let total = 0;
        document.querySelectorAll('.item.active').forEach(a => {
            total += parseInt(a.querySelector('.price').innerText.replace('$', ''));
        });
        document.getElementById('total').innerText = total;
    }

    function send() {
        let list = [];
        document.querySelectorAll('.item.active').forEach(a => list.push(a.innerText.split('$')[0].trim()));
        if(list.length === 0) return alert("請選擇項目");
        const msg = `【fon__nail 預約諮詢】\n項目：${list.join(' + ')}\n預算：NT$ ${document.getElementById('total').innerText}\n----------\n日期：\n時間：`;
        window.location.href = `https://line.me/R/msg/text/?${encodeURIComponent(msg)}`;
    }
</script>

</body>
</html>
