<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fon__nail | 快速預約計算</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=Poppins:wght@200;400&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #E5989B 0%, #1B263B 100%); /* 紅藍漸層背景 */
            background-attachment: fixed;
            display: flex; justify-content: center; align-items: flex-start;
            padding: 20px 0;
        }

        .glass-container {
            width: 90%; max-width: 480px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 35px 20px; box-sizing: border-box; color: #2B2D42;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 { font-family: 'Poppins', sans-serif; font-weight: 200; font-size: 30px; letter-spacing: 6px; text-align: center; margin: 0; color: #1B263B; }
        .subtitle { font-size: 12px; text-align: center; margin: 8px 0; color: #4A4E69; letter-spacing: 1px; }
        .divider { height: 1px; background-color: rgba(27, 38, 59, 0.15); margin: 25px auto; width: 85%; }

        /* 選項群組 */
        .category-title { 
            font-weight: 700; font-size: 17px; margin: 25px 0 15px 5px; 
            display: flex; align-items: center; color: #1B263B;
        }
        .category-title::before { content: ""; width: 4px; height: 18px; background: #E5989B; margin-right: 10px; border-radius: 2px; }

        .option-card {
            background: rgba(255, 255, 255, 0.25);
            border-radius: 15px; margin-bottom: 10px; padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .option-card.active {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid #E5989B;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(229, 152, 155, 0.2);
        }

        .item-name { font-size: 15px; font-weight: 400; }
        .item-price { font-weight: 700; color: #1B263B; }
        .sub-note { font-size: 10px; color: #6D6875; display: block; margin-top: 2px; }

        /* 底部結帳欄 */
        .bottom-bar {
            position: sticky; bottom: -10px; 
            background: rgba(255, 255, 255, 0.9);
            margin: 30px -20px -35px -20px;
            padding: 25px 20px;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
            text-align: center;
        }
        .total-label { font-size: 14px; color: #6D6875; margin-bottom: 5px; }
        .total-price { font-size: 32px; font-weight: 700; color: #1B263B; margin-bottom: 15px; }
        .total-price span { font-size: 18px; margin-right: 5px; }

        .submit-btn {
            background: #1B263B; color: white; border: none; 
            padding: 15px; border-radius: 15px; width: 100%;
            font-size: 16px; font-weight: 700; cursor: pointer;
            transition: 0.3s;
        }
        .submit-btn:active { transform: scale(0.97); background: #0D1B2A; }
    </style>
</head>
<body>

<div class="glass-container">
    <h1>PRICE LIST</h1>
    <div class="subtitle">fon__nail 快速估價系統</div>
    <div class="divider"></div>

    <div class="category-title">卸甲服務</div>
    <div class="option-card" onclick="toggleItem(this, '本店卸續做', 100)">
        <div><span class="item-name">本店卸續做</span></div>
        <span class="item-price">$100</span>
    </div>
    <div class="option-card" onclick="toggleItem(this, '他店卸續做', 200)">
        <div><span class="item-name">他店卸續做</span><span class="sub-note">含大飾品/厚甲/硬甲油</span></div>
        <span class="item-price">$200</span>
    </div>

    <div class="category-title">美甲款式</div>
    <div class="option-card" onclick="selectOne(this, 'nail-style', '單色/貓眼', 500)">
        <div><span class="item-name">基礎單色 / 貓眼</span></div>
        <span class="item-price">$500</span>
    </div>
    <div class="option-card" onclick="selectOne(this, 'nail-style', '指定款', 700)">
        <div><span class="item-name">造型指定款</span><span class="sub-note">依複雜程度報價 \$700 起</span></div>
        <span class="item-price">$700</span>
    </div>

    <div class="category-title">其他加購</div>
    <div class="option-card" onclick="toggleItem(this, '跳色', 20)">
        <div><span class="item-name">跳色 (乙色)</span></div>
        <span class="item-price">$20</span>
    </div>
    <div class="option-card" onclick="toggleItem(this, '延甲', 50)">
        <div><span class="item-name">延甲 (每指)</span></div>
        <span class="item-price">$50</span>
    </div>

    <div class="bottom-bar">
        <div class="total-label">預估總金額</div>
        <div class="total-price"><span>NT$</span><span id="display-total">0</span></div>
        <button class="submit-btn" onclick="sendToLine()">產出預約訊息並傳送</button>
    </div>
</div>

<script>
    let totalPrice = 0;
    let selectedList = [];

    function toggleItem(el, name, price) {
        el.classList.toggle('active');
        calculate();
    }

    function selectOne(el, group, name, price) {
        const siblings = el.parentElement.querySelectorAll('.option-card');
        const isActive = el.classList.contains('active');
        siblings.forEach(s => s.classList.remove('active'));
        if (!isActive) el.classList.add('active');
        calculate();
    }

    function calculate() {
        totalPrice = 0;
        selectedList = [];
        const actives = document.querySelectorAll('.option-card.active');
        actives.forEach(a => {
            const name = a.querySelector('.item-name').innerText;
            const price = parseInt(a.querySelector('.item-price').innerText.replace('$', ''));
            totalPrice += price;
            selectedList.push(name);
        });
        document.getElementById('display-total').innerText = totalPrice;
    }

    function sendToLine() {
        if (selectedList.length === 0) {
            alert("請先選擇服務項目喔！");
            return;
        }
        const msg = `【fon__nail 預約諮詢】\n服務項目：${selectedList.join(' + ')}\n預算總計：NT$ ${totalPrice}\n------------------\n日期：\n時間：\n備註：`;
        window.location.href = `https://line.me/R/msg/text/?${encodeURIComponent(msg)}`;
    }
</script>

</body>
</html>
